name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TF_IN_AUTOMATION: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate app
        run: |
          npm run lint
          npm run type-check
          npm run build

      - name: Set image tag
        id: image
        run: echo "tag=${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform apply
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_domain_name: ${{ secrets.APP_DOMAIN }}
          TF_VAR_ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}
          TF_VAR_server_type: ${{ secrets.HCLOUD_SERVER_TYPE }}
          TF_VAR_location: ${{ secrets.HCLOUD_LOCATION }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Capture server IP
        id: terraform_output
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_domain_name: ${{ secrets.APP_DOMAIN }}
          TF_VAR_ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}
          TF_VAR_server_type: ${{ secrets.HCLOUD_SERVER_TYPE }}
          TF_VAR_location: ${{ secrets.HCLOUD_LOCATION }}
        run: echo "ip=$(terraform output -raw public_ipv4)" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' '${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ steps.terraform_output.outputs.ip }} >> ~/.ssh/known_hosts

      - name: Run Ansible deployment
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i "${{ steps.terraform_output.outputs.ip }}," \
            -u root \
            --private-key ~/.ssh/id_ed25519 \
            infra/ansible/playbooks/deploy.yml \
            -e "app_image=${{ steps.image.outputs.tag }}" \
            -e "ghcr_username=${{ secrets.GHCR_USERNAME }}" \
            -e "ghcr_token=${{ secrets.GHCR_TOKEN }}" \
            -e "domain_name=${{ secrets.APP_DOMAIN }}" \
            -e "next_public_site_url=https://${{ secrets.APP_DOMAIN }}"
