name: indexnow

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: indexnow-production
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Wait for production deployment
        run: |
          sleep 60
          for attempt in {1..20}; do
            if curl --fail --silent --show-error \
              "https://yvadev.com/144368cc21c84de0a965d0b3a4a818a9.txt" \
              | grep --fixed-strings --line-regexp --quiet \
                "144368cc21c84de0a965d0b3a4a818a9"; then
              exit 0
            fi
            sleep 15
          done
          echo "IndexNow key is not available in production." >&2
          exit 1

      - name: Notify IndexNow
        run: >-
          node scripts/submit-indexnow.mjs
          --before "${{ github.event.before }}"
          --after "${{ github.sha }}"
